<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Login</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
            /* background-color: rgb(12, 15, 190); */
        }
        .login-box{
            width: 300px;
            height: 230px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .login-box h2, p{
            text-align: center;
        }
        input[type="text"], input[type="password"] {
            width: 280px;
            margin: 3px;
            padding: 5px;
            border-radius: 5px;
        }
        button{
            width: 100px;
            margin: 5px;
            display: flex;
            background: rgb(125, 206, 19);
            color: aliceblue;
            cursor: pointer;
            border-radius: 5px;
            padding: 5px;
            margin-top: 20px;
            text-align: center;
        }
        button:hover{
            background: black;
        }
        #bg-image {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vw;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: -1;
        }
        .login-box {
        position: relative;
        z-index: 1;
        }
        a {
    text-decoration: none;
    }
    .button{
        display: flex;
        justify-content: center;
        gap: 0;
        }
    </style>
</head>
<body>
    <div class="login-box">
    <h2>Ganti Password</h2>

    <Label>Password baru</Label>
    <input type="Password" name="password" placeholder="masukan password baru" required>
    
    <Label>Password baru</Label>
    <input type="password" name="password" placeholder="masukan kembali password baru" required>
        <Div class="button">
    <a href="latihan2.html"><button type="submit">Simpan</button></a>
        <a href="latihan2.html"><button type="submit"> batal</button></a>
    </Div>
    </div>

    <img id="bg-image"
    src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Pemandangan_Gunung_Bromo.jpg">
</body>
</html>
