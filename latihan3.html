    <title>Menu Login</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
            /* background-color: rgb(12, 15, 190); */
        }
        .login-box{
            width: 300px;
            height: 420px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .login-box h2, p{
            text-align: center;
        }
        input[type="text"], input[type="password"] {
            width: 280px;
            margin: 3px;
            padding: 5px;
            border-radius: 5px;
        }
        button{
            width: 100px;
            margin: 10px auto;
            display: block;
            background: rgb(125, 206, 19);
            color: aliceblue;
            cursor: pointer;
            border-radius: 5px;
            padding: 5px;
        }
        button:hover{
            background: black;
        }
        #bg-image {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vw;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: -1;
        }
        .login-box {
        position: relative;
        z-index: 1;
        }
        .foto{
        display: flex;
        justify-content: center;
        gap: 10px;
        }
        .foto img{
            width: 40px;
            height: 40px;
        }
        a {
    text-decoration: none;
}

    </style>
</head>

    <h2>Daftar Akun</h2>

    <Label>Username</Label>

    <Label>gmail</Label>
    <input type="text" name="gmail" placeholder="masukan gmail" required>

    <Label>Password</Label>
    <input type="password" name="Password" placeholder="buat pasword" required>

    <Label>Password</Label>
    <input type="password" name="password" placeholder="konfirmasi password" required>

    <button type="submit">Daftar</button>
