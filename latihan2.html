<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Login</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
            /* background-color: rgb(12, 15, 190); */
        }
        .login-box{
            width: 300px;
            height: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .login-box h2, p{
            text-align: center;
        }
        input[type="text"], input[type="password"] {
            width: 280px;
            margin: 3px;
            padding: 5px;
            border-radius: 5px;
        }
        button{
            width: 100px;
            margin: 10px auto;
            display: block;
            background: rgb(125, 206, 19);
            color: aliceblue;
            cursor: pointer;
            border-radius: 5px;
            padding: 5px;
        }
        button:hover{
            background: black;
        }
        #bg-image {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vw;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: -1;
        }
        .login-box {
        position: relative;
        z-index: 1;
        }
        a {
    text-decoration: none;
}
    .lupa {
    width: 280px;
    margin: 0 auto;
    text-align: left;
    font-size: 12px;
}
    </style>
</head>
<body>
    <div class="login-box">
    <h2>Login</h2>

    <Label>Username</Label>
    <input type="text" name="username" placeholder="masukan username" required>
    
    <Label>Password</Label>
    <input type="password" name="password" placeholder="masukan password" required>
        <div class="lupa">
        <a href="lupa.html">Lupa Password</a>
        </div>
    <button type="submit">Login</button>
    <p>Belum punya akun?<a href="latihan3.html" margin-left="30px">Daftar sekarang</a></p>
    </div>

    <img id="bg-image"
    src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Pemandangan_Gunung_Bromo.jpg">
</body>
</html>
