<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://th.bing.com/th/id/OIP.UTlaSVQaqqqFUNuhGSGh3wHaHa?w=167&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3">
    <title>Menu Login</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
            /* background-color: rgb(12, 15, 190); */
            color: aliceblue;
        }
        .login-box{
            width: 300px;
            height: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .login-box h2, p{
            text-align: center;
        }
        input[type="text"], input[type="password"] {
            width: 280px;
            margin: 3px;
            padding: 5px;
            border-radius: 5px;
        }
        button{
            width: 100px;
            margin: 10px auto;
            display: block;
            background: rgba(25, 31, 101, 0.616);
            color: aliceblue;
            cursor: pointer;
            border-radius: 5px;
            padding: 5px;
        }
        button:hover{
            background: black;
        }
        #bg-image {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vw;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: -1;
        }
        .login-box {
        position: relative;
        z-index: 1;
        }
        a {
    text-decoration: none;
}
    .lupa {
    width: 280px;
    margin: 0 auto;
    text-align: left;
    font-size: 12px;
}
img{
    display: block;
    margin: auto;
    cursor: crosshair;
}
    </style>
</head>
<body>
    <div class="login-box">

<nav>
    <img src="lucu.gif" width="100" height="100">
    <h2>welcome to my blok</h2>
    <form>
        <label for="username">Username</label><br />
        <input type="text" id="username" name="username" placeholder="Nama Gue"/><br />

        <label for="password">password</label><br />
        <input type="password" id="password" name="password" placeholder="Kelas gue"/><br />
        <button type="submit">Masuk</button>
    </form>
        
    <img id="bg-image"
    src="bg.jpg" >

    </nav>
</body>
</html>
